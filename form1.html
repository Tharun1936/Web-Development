<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Fill the form given below</h1>
    <form action="Post">
        <div>
        <label for="username">Enter your username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        <label for="password">Enter your password</label>
        <input type="password" name="password" placeholder="Enter your password">
        </div>
        <Div>
        <label for="eamil">Enter Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email" autofocus>
        </Div>
        <div>
            
            <input type="radio" id="Male" name="Gender" value="Male">
            <label for="Male">Male</label>
            <input type="radio" id="Feamle" name="Gender" value="Female">
            <label for="Female">Female</label>
        </div>
        <div>
            <input type="checkbox" name="Subscribe" id="Subscribe" value="yes">
            <label for="Subscribe">Subscribed to Tharun's channel</label>
        </div>
        <div>
            <label for="textarea">Enter Comments</label>
            <br>
            <textarea name="text area" rows="5" cols="50" id="textarea">Comments</textarea>
        </div>

    </form>
</body>
</html>
