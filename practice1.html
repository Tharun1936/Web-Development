<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <h1> Party RSVP</h1>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter Your Name">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder=">18">
    </div>
    <div>
        <label for="phone number">Phone number</label>
        <input type="number" id="phone number" placeholder="Ph No">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="...@gmail.com" autofocus>
    </div>
    <div>
        <label for="couple">Couple</label>
        <input type="radio" id="couple">
    </div>

    <div>
        <input type="submit" name="submit" value="Submit">
    </div>

</body>

</html>
